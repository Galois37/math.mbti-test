<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测测你的数学人格</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50; 
            --bg-color: #eef4f9; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: "Times New Roman", "Source Han Serif CN", serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 水印层：减少数量，改为动态流式，避免在手机上混乱 */
        .math-watermark {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
        }

        .formula { position: absolute; white-space: nowrap; font-size: 1.2rem; }

        /* 首页内容容器 */
        .landing-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 88%;
            max-width: 550px;
            padding: 40px 25px;
            background: rgba(238, 244, 249, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
        }

        .mbti-header {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .author-tag {
            font-size: 0.85rem;
            color: #bdc3c7;
            margin-bottom: 30px;
        }

        /* 标题容器：用于放置左右公式 */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* 公式与文字的间距 */
            margin-bottom: 10px;
        }

        .title-formula {
            font-size: 1.2rem; /* 在卡片里显示的公式字号 */
            opacity: 0.8;
            color: var(--primary-color);
        }

        .title {
            font-size: 2.6rem;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 800;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #5d6d7e;
            margin-bottom: 40px;
        }

        .intro-text {
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 45px;
            color: #34495e;
            text-align: justify;
        }

        /* 启动按钮 */
        .start-btn {
            background: transparent;
            border: 1.2px solid var(--primary-color);
            padding: 16px 0;
            width: 85%;
            max-width: 280px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-main { display: block; font-size: 1.3rem; font-weight: bold; }
        .btn-sub { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

        /* 响应式微调 */
        @media (min-width: 768px) {
            .title { font-size: 3.6rem; }
            .landing-container { width: 100%; padding: 60px; }
            .start-btn:hover { background: var(--primary-color); color: white; transform: scale(1.05); }
        }

        /* 针对超窄屏手机的特殊处理 */
        @media (max-width: 375px) {
            .title-container { flex-direction: column; gap: 5px; } /* 实在太窄就上下排 */
            .title { font-size: 2.2rem; }
        }

        .fade-in { animation: fadeIn 1.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="math-watermark">
        <div class="formula" style="top: 15%; right: 5%;">$$\text{Gal}(L/K)$$</div>
        <div class="formula" style="bottom: 15%; left: 8%;">$$\chi(M) = 2 - 2g$$</div>
    </div>

    <div class="landing-container fade-in">
        <div class="mbti-header">MATHEMATICAL BRAIN TYPE INDICATOR</div>
        <div class="author-tag">[By Galois37]</div>

        <div class="title-container">
            <span class="title-formula">$$\int_{\Omega} d\omega$$</span>
            <h1 class="title">测测你的<br>数学人格</h1>
            <span class="title-formula">$$= \int_{\partial \Omega} \omega$$</span>
        </div>

        <p class="subtitle">Mathematical Personality Inventory</p>

        <div class="intro-text">
            别对着数分高代发愁了，来看看你是哪种“数学怪胎”。是沉迷抽象大厦的<strong>格罗滕迪克信徒</strong>，还是手算积分解方程的<strong>计算硬汉</strong>？点击下方初始化算力，在 27 道判别式中寻找你的<strong>非平凡解</strong>。
        </div>

        <button class="start-btn" onclick="startTest()">
            <span class="btn-main">初始化算力</span>
            <span class="btn-sub">Initialize Heuristics</span>
        </button>
    </div>

    <script>
        function startTest() {
            const el = document.querySelector('.landing-container');
            el.style.opacity = '0';
            el.style.transform = 'scale(0.98)';
            el.style.transition = '0.5s ease';
            setTimeout(() => {
                // 跳转逻辑预留
                console.log("准备进入定义域...");
            }, 500);
        }
    </script>
</body>
</html>
